version: '3.8'

services:
  # ---------------- MySQL 服务 ----------------
  mysql:
    image: mysql:5.7
    container_name: sport-mysql
    environment:
      MYSQL_ROOT_PASSWORD: 123456  # 数据库密码
      MYSQL_DATABASE: sportapp     # 数据库名
      TZ: Asia/Shanghai
    ports:
      - "3307:3307"
    volumes:
      # 挂载初始化脚本
      - ./sql:/docker-entrypoint-initdb.d
      # 数据持久化 (防止重启丢数据)
      - ./mysql-data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  # ---------------- Redis 服务 ----------------
  redis:
    image: redis:6.2
    container_name: sport-redis
    ports:
      - "6379:6379"
    volumes:
      - ./redis-data:/data # 持久化
    # 开启持久化存储 (AOF)
    command: redis-server --appendonly yes

  # ---------------- Java 后端 ----------------
  backend:
    build: .  # 使用当前目录的 Dockerfile 构建镜像
    container_name: sport-backend
    ports:
      - "8080:8080"
    environment:
      # 覆盖 application.yml 里的配置
      # 数据库地址写服务名 'mysql'
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/sportapp?useUnicode=true&characterEncoding=utf-8&serverTimezone=GMT%2B8
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 123456
      # Redis 地址写服务名 'redis'
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
    depends_on:
      - mysql  # 等数据库启了再启后端
      - redis  # 等Redis启了再启后端